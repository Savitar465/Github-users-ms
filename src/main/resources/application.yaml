application-version: '@project.version@'
application-description: '@project.description@'
server:
  port: ${SERVER_PORT:8081}

grpc:
  server:
    port: ${GRPC_PORT:9092}

spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: @activatedProperties@
  application:
    name: ${SPRING_APPLICATION_NAME:ms-usuarios}

  datasource:
    url: ${USUARIOS_DB_URL:jdbc:postgresql://localhost:5432/usuario_database?currentSchema=usuarios_nuevo}
    username: ${USUARIOS_DB_USERNAME:postgres}
    password: ${USUARIOS_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
       hibernate:
         dialect: org.hibernate.dialect.PostgreSQLDialect
    generate-ddl: true

  security:
    oauth2:
      resource-server:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:https://keycloakqa.apps.gob.bo/realms/test}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:https://keycloakqa.apps.gob.bo/realms/test/protocol/openid-connect/certs}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org:
      keycloak: DEBUG
      springframework:
        security: DEBUG


keycloak-client:
  server-url: ${KEYCLOAK_SERVER_URL:https://keycloakqa.apps.gob.bo}
  realm: ${KEYCLOAK_REALM:test}
  # Admin client — used for server-to-server Keycloak Admin API calls (client_credentials grant)
  client: ${KEYCLOAK_ADMIN_CLIENT:admin-java}
  client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:change_me}
  # Login client — must have "Direct Access Grants" enabled in Keycloak (password grant)
  login-client: ${KEYCLOAK_CLIENT_ID:ms-users}
  login-client-secret: ${KEYCLOAK_CLIENT_SECRET:change_me}
