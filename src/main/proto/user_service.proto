syntax = "proto3";

package com.githubx.grpc;

option java_package = "com.githubx.grpc.proto";
option java_outer_classname = "UserServiceProto";
option java_multiple_files = true;

// ─────────────────────────────────────────────────────────────
// COMMON MESSAGES
// ─────────────────────────────────────────────────────────────

message PaginationMeta {
  int32 page = 1;
  int32 per_page = 2;
  int32 total = 3;
  int32 total_pages = 4;
}

message PaginationRequest {
  int32 page = 1;
  int32 per_page = 2;
}

// ─────────────────────────────────────────────────────────────
// USER MESSAGES
// ─────────────────────────────────────────────────────────────

message UserDTO {
  string user_id = 1;
  string email = 2;
  string username = 3;
  string first_name = 4;
  string last_name = 5;
  int32 status = 6;
  string created_date = 7;
  string modified_date = 8;
}

// ─── User CRUD ────────────────────────────────────────────────

message GetUserRequest {
  string user_id = 1;
}

message GetUserResponse {
  UserDTO user = 1;
}

message ListUsersRequest {
  PaginationRequest pagination = 1;
}

message ListUsersResponse {
  repeated UserDTO users = 1;
  PaginationMeta pagination = 2;
}

message CreateUserRequest {
  string email = 1;
  string username = 2;
  string first_name = 3;
  string last_name = 4;
  string password = 5;
}

message CreateUserResponse {
  UserDTO user = 1;
}

message EditUserRequest {
  string user_id = 1;
  string email = 2;
  string username = 3;
  string first_name = 4;
  string last_name = 5;
  string password = 6;
}

message EditUserResponse {
  UserDTO user = 1;
}

message DeleteUserRequest {
  string user_id = 1;
}

message DeleteUserResponse {
  bool success = 1;
  string message = 2;
}

// ─────────────────────────────────────────────────────────────
// SERVICES
// ─────────────────────────────────────────────────────────────

// UserPublicApi — lectura pública, sin autenticación
service UserPublicApi {
  rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

// UserApi — operaciones protegidas, requiere JWT en metadata
service UserApi {
  rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
  rpc EditUser(EditUserRequest) returns (EditUserResponse);
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
}
